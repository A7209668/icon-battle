// 代碼

💾存檔
localStorage.setItem("save", JSON.stringify(player))

if(按鍵["Space"]){ 攻擊() } // 空白鍵 → 發射子彈
if(按鍵["KeyQ"]) 技能()
if(按鍵["ShiftLeft"]) 玩家.速度=8

*/

const 參數 = {地圖:{寬:600,高:400},
玩家:{x:50,y:180,
血量:100,攻擊:5,速度:4,大小:40},
敵人:{x:500,y:180,
血量:100,攻擊:3,速度:2,大小:40},
}

let 玩家={...參數.玩家};
let 敵人={...參數.玩家};

let 遊戲中=false;

let 玩家元素=document.getElementById("玩家");
let 敵人元素=document.getElementById("敵人");
let 訊息=document.getElementById("訊息");
let 玩家血條=document.getElementById("玩家血條");
let 敵人血條=document.getElementById("敵人血條");

const 戰場 = document.getElementById("戰場");
戰場.style.width = 參數.地圖.寬 + "px";
戰場.style.height = 參數.地圖.高 + "px";

function 套用面板(){
玩家={...玩家, 
血量: parseInt(玩家血量.value), 
攻擊: parseInt(玩家攻擊.value), 
速度: parseInt(玩家速度.value) 
};

敵人={...敵人, 
血量: parseInt(敵人血量.value), 
攻擊: parseInt(敵人攻擊.value), 
速度: parseInt(敵人速度.value) 
};
}

function 開始遊戲(){套用面板();
玩家={ ...玩家, x: 參數.玩家.x, y: 參數.玩家.y };
敵人={ ...敵人, x: 參數.敵人.x, y: 參數.敵人.y };

遊戲中=true;
訊息.innerText="戰鬥開始";

更新();}

function 結束遊戲(){遊戲中=false;
訊息.innerText="遊戲結束";}

function 更新(){if(!遊戲中) return;
玩家移動();
敵人AI();
碰撞判定();
畫面更新();
更新UI();
requestAnimationFrame(更新);
}

let 按鍵={};
document.addEventListener("keydown",e=>{按鍵[e.code]=true});
document.addEventListener("keyup",e=>{按鍵[e.code]=false});

let 鍵位 = {
上: ["KeyW", "ArrowUp","Numpad8"],
下: ["KeyS", "ArrowDown", "Numpad2"],
左: ["KeyA", "ArrowLeft", "Numpad4"],
右: ["KeyD", "ArrowRight", "Numpad6"],
右上: ["Numpad9"],
左上: ["Numpad7"],
右下: ["Numpad3"],
左下: ["Numpad1"]
}

/* 鍵位表(MD)

| 鍵位 | e.key | e.code | keyCode(舊) |

| W | w / W | KeyW | 87 |

| Shift | Shift | ShiftLeft / ShiftRight | 16 |
| Ctrl | Control | ControlLeft / ControlRight | 17 |
| Alt | Alt | AltLeft / AltRight | 18 |

| 動作 | 鍵盤 | e.code |

| 上 | W | KeyW |

## 方向控制鍵

function 按下(...keys){  return keys.flat().some(k => 按鍵[k]);}

function 玩家移動(){
let[dx, dy]=[按下(鍵位.右)-按下(鍵位.左), 按下(鍵位.下)-按下(鍵位.上)];
let d = Math.hypot(dx, dy)||1;

let{x,y,速度}=玩家;
[x,y]=[x+dx/d*速度,y+dy/d*速度];
玩家={...玩家,x,y};

限制範圍(玩家);}

function 敵人AI(){
let dx=玩家.x-敵人.x;
let dy=玩家.y-敵人.y;
let 距離=Math.sqrt(dx*dx+dy*dy);

if(距離>0){
敵人.x+=dx/距離*敵人.速度;
敵人.y+=dy/距離*敵人.速度;
}

限制範圍(敵人);}

function 限制範圍(角色){
if(角色.x<0)角色.x=0;if(角色.y<0)角色.y=0;
if(角色.x>600-角色.大小)角色.x=600-角色.大小;
if(角色.y>400-角色.大小)角色.y=400-角色.大小;
}

function 碰撞判定(){
let dx=玩家.x-敵人.x;let dy=玩家.y-敵人.y;
let 距離=Math.sqrt(dx*dx+dy*dy);

if(距離<40){
玩家.血量-=敵人.攻擊;敵人.血量-=玩家.攻擊;}

玩家.血量 = Math.max(玩家.血量,0);
敵人.血量 = Math.max(敵人.血量,0);

if(玩家.血量<=0){訊息.innerText="玩家死亡";結束遊戲();}
if(敵人.血量<=0){訊息.innerText="敵人死亡";結束遊戲();}
}

function 更新UI(){
Object.entries({ 玩家血條: 玩家.血量, 敵人血條: 敵人.血量 })
.forEach(([元素, 值]) => window[元素].style.width = `${值}px`);}

function 更新元素位置(元素,{x,y,大小 }){
Object.entries({left:x,top:y,width:大小,height:大小})
.forEach(([樣式, 值])=>元素.style[樣式]=`${值}px`);}

function 畫面更新(){
更新元素位置(玩家元素, 玩家);
更新元素位置(敵人元素, 敵人);
}

</script>
